<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 518 600" width="518" height="600">
  <defs>
    <!-- Near-black indigo with radial spotlight on the curve -->
    <radialGradient id="bg" cx="56%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#151835"/>
      <stop offset="100%" stop-color="#0A0C1F"/>
    </radialGradient>

    <!-- Bright indigo border, lit from upper-left -->
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>

    <!-- Confidence band in indigo, tapered -->
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0"/>
      <stop offset="30%" stop-color="#6366F1" stop-opacity="0.25"/>
      <stop offset="65%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.05"/>
    </linearGradient>

    <!-- The brand gradient: soft indigo-white enters, gold exits -->
    <linearGradient id="curve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="70%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <clipPath id="hex">
      <polygon points="259,22 500,161 500,439 259,578 18,439 18,161"/>
    </clipPath>
  </defs>

  <!-- Hex border -->
  <polygon points="259,13 508,157 508,443 259,587 10,443 10,157"
           fill="url(#border)"/>

  <!-- Hex background -->
  <polygon points="259,22 500,161 500,439 259,578 18,439 18,161"
           fill="url(#bg)"/>

  <!-- Confidence band: bleeds to hex edge, clipped -->
  <path d="M 240 398 Q 318 105 405 95 L 405 195 Q 345 200 240 398 Z"
        fill="url(#band)" clip-path="url(#hex)"/>

  <!-- Drop shadow -->
  <path d="M 116 283 L 242 401 Q 332 153 407 148"
        fill="none" stroke="#000000" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.10"/>

  <!-- THE MARK: centered (bbox x: 113–405, center=259), shifted 20px down -->
  <path d="M 113 280 L 240 398 Q 330 150 405 145"
        fill="none" stroke="url(#curve)" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- THE NAME -->
  <text x="259" y="502" text-anchor="middle"
        font-family="Trebuchet MS, Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="bold" letter-spacing="2">
    <tspan fill="#C7D2FE">vali</tspan><tspan fill="#F59E0B">CATE</tspan>
  </text>
</svg>
